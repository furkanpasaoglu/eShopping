name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore eShopping.slnx

      - name: Build
        run: dotnet build eShopping.slnx -c Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test eShopping.slnx
          -c Release
          --no-build
          --filter "FullyQualifiedName~Unit"
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./TestResults

      - name: Run integration tests
        run: >
          dotnet test eShopping.slnx
          -c Release
          --no-build
          --filter "FullyQualifiedName~Integration"
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 14

  docker:
    name: Build Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: catalog-api
            dockerfile: src/Services/Catalog/Catalog.API/Dockerfile
          - name: basket-api
            dockerfile: src/Services/Basket/Basket.API/Dockerfile
          - name: stock-api
            dockerfile: src/Services/Stock/Stock.API/Dockerfile
          - name: order-api
            dockerfile: src/Services/Order/Order.API/Dockerfile
          - name: payment-api
            dockerfile: src/Services/Payment/Payment.API/Dockerfile
          - name: notification-worker
            dockerfile: src/Services/Notification/Notification.Worker/Dockerfile
          - name: gateway-api
            dockerfile: src/Gateways/Gateway.API/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
