syntax = "proto3";

option csharp_namespace = "Shared.Grpc.Catalog";

package catalog;

service CatalogGrpcService {
  rpc GetProductById (GetProductByIdRequest) returns (GetProductByIdResponse);
}

message GetProductByIdRequest {
  string product_id = 1;
}

message GetProductByIdResponse {
  bool found = 1;
  ProductDto product = 2;
}

message ProductDto {
  string id = 1;
  string name = 2;
  double price = 3;
  string currency = 4;
  string category = 5;
  reserved 6;
  string description = 7;
  string image_url = 8;
}
