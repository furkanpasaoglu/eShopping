# Development overrides — adds observability stack and debug ports.
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up

services:

  # ── Observability Stack ────────────────────────────────────────────

  tempo:
    image: grafana/tempo:2.7.2
    volumes:
      - ../../src/AppHost/monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ../../src/AppHost/monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ../../src/AppHost/monitoring/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=native-histograms"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    volumes:
      - ../../src/AppHost/monitoring/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
      - loki
      - prometheus

  grafana:
    image: grafana/grafana:11.5.2
    volumes:
      - ../../src/AppHost/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3300:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: ["server", "-dev"]
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  # ── Vault + OTel env vars for services ─────────────────────────────

  catalog-api:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp

  basket-api:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp

  stock-api:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp

  order-api:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp

  payment-api:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp

  notification-worker:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp

  gateway-api:
    environment:
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT_POINT: secret
      OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4317
      LOKI_OTLP_ENDPOINT: http://loki:3100/otlp
