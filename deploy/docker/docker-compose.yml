services:

  # ── Infrastructure ─────────────────────────────────────────────────

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ../../src/AppHost/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Application Services ───────────────────────────────────────────

  catalog-api:
    image: ${REGISTRY}/catalog-api:${TAG}
    build:
      context: ../..
      dockerfile: src/Services/Catalog/Catalog.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__catalog-db: mongodb://mongo:27017/catalog
      ConnectionStrings__elasticsearch: http://elasticsearch:9200
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    ports:
      - "5001:8080"
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  basket-api:
    image: ${REGISTRY}/basket-api:${TAG}
    build:
      context: ../..
      dockerfile: src/Services/Basket/Basket.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__redis: redis:6379
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    ports:
      - "5002:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  stock-api:
    image: ${REGISTRY}/stock-api:${TAG}
    build:
      context: ../..
      dockerfile: src/Services/Stock/Stock.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__stock-db: Host=postgres;Database=stock;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  order-api:
    image: ${REGISTRY}/order-api:${TAG}
    build:
      context: ../..
      dockerfile: src/Services/Order/Order.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__order-db: Host=postgres;Database=order;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    ports:
      - "5004:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  payment-api:
    image: ${REGISTRY}/payment-api:${TAG}
    build:
      context: ../..
      dockerfile: src/Services/Payment/Payment.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__payment-db: Host=postgres;Database=payment;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-worker:
    image: ${REGISTRY}/notification-worker:${TAG}
    build:
      context: ../..
      dockerfile: src/Services/Notification/Notification.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  gateway-api:
    image: ${REGISTRY}/gateway-api:${TAG}
    build:
      context: ../..
      dockerfile: src/Gateways/Gateway.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Keycloak__auth-server-url: http://keycloak:8080
      Keycloak__realm: eshopping
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog__Address: http://catalog-api:8080
      ReverseProxy__Clusters__basket-cluster__Destinations__basket__Address: http://basket-api:8080
      ReverseProxy__Clusters__order-cluster__Destinations__order__Address: http://order-api:8080
      ReverseProxy__Clusters__stock-cluster__Destinations__stock__Address: http://stock-api:8080
    ports:
      - "5000:8080"
    depends_on:
      catalog-api:
        condition: service_healthy
      basket-api:
        condition: service_healthy
      order-api:
        condition: service_healthy
      stock-api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/alive || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  rabbitmq-data:
  es-data:
